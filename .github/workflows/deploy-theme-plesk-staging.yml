name: Deploy Theme to Plesk (Staging)

on:
  push:
    branches: [staging]
    paths:
      - "wp-content/themes/halifax-now-broadsheet/**"
      - "v3-preview/**"
      - ".github/workflows/deploy-theme-plesk-staging.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no files transferred)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      force_delete:
        description: "Delete remote files not present locally (dangerous)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required staging secrets
        shell: bash
        env:
          PLESK_THEME_PATH: ${{ secrets.PLESK_STAGING_THEME_PATH }}
          PLESK_SSH_HOST: ${{ secrets.PLESK_STAGING_SSH_HOST }}
          PLESK_SSH_USER: ${{ secrets.PLESK_STAGING_SSH_USER }}
          PLESK_SSH_KEY: ${{ secrets.PLESK_STAGING_SSH_KEY }}
          PLESK_SSH_PORT: ${{ secrets.PLESK_STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          for v in PLESK_THEME_PATH PLESK_SSH_HOST PLESK_SSH_USER PLESK_SSH_KEY PLESK_SSH_PORT; do
            if [ -z "${!v}" ]; then
              echo "Missing required staging secret: $v"
              exit 1
            fi
          done

      - name: Build rsync switches
        id: rsync_flags
        shell: bash
        run: |
          set -euo pipefail
          FLAGS="-avzr --exclude=.git --exclude=.github"

          # Only delete when explicitly allowed in manual dispatch.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_delete }}" == "true" ]]; then
            FLAGS="$FLAGS --delete"
          fi

          # Optional dry-run for manual runs.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            FLAGS="$FLAGS --dry-run"
          fi

          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "Using rsync flags: $FLAGS"

      - name: Safety check remote path
        shell: bash
        run: |
          set -euo pipefail
          RP="${{ secrets.PLESK_STAGING_THEME_PATH }}"
          # Basic guardrails against dangerous targets.
          if [[ -z "$RP" || "$RP" == "/" || "$RP" == "/var/www" || "$RP" == "/home" ]]; then
            echo "Unsafe PLESK_STAGING_THEME_PATH: '$RP'"
            exit 1
          fi

      - name: Derive staging web root from theme path
        id: web_root
        shell: bash
        run: |
          set -euo pipefail
          THEME_PATH="${{ secrets.PLESK_STAGING_THEME_PATH }}"
          SUFFIX="/wp-content/themes/halifax-now-broadsheet"
          if [[ "$THEME_PATH" != *"$SUFFIX" ]]; then
            echo "PLESK_STAGING_THEME_PATH must end with '$SUFFIX' to derive web root safely."
            echo "Current value: '$THEME_PATH'"
            exit 1
          fi
          ROOT="${THEME_PATH%$SUFFIX}"
          if [[ -z "$ROOT" || "$ROOT" == "/" ]]; then
            echo "Derived web root is unsafe: '$ROOT'"
            exit 1
          fi
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "Derived staging web root: $ROOT"

      - name: Deploy theme to staging via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: ${{ steps.rsync_flags.outputs.flags }}
          path: wp-content/themes/halifax-now-broadsheet/
          remote_path: ${{ secrets.PLESK_STAGING_THEME_PATH }}/
          remote_host: ${{ secrets.PLESK_STAGING_SSH_HOST }}
          remote_user: ${{ secrets.PLESK_STAGING_SSH_USER }}
          remote_key: ${{ secrets.PLESK_STAGING_SSH_KEY }}
          remote_port: ${{ secrets.PLESK_STAGING_SSH_PORT }}

      - name: Deploy v3 preview app to staging web root
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: ${{ steps.rsync_flags.outputs.flags }}
          path: v3-preview/
          remote_path: ${{ steps.web_root.outputs.root }}/v3-preview/
          remote_host: ${{ secrets.PLESK_STAGING_SSH_HOST }}
          remote_user: ${{ secrets.PLESK_STAGING_SSH_USER }}
          remote_key: ${{ secrets.PLESK_STAGING_SSH_KEY }}
          remote_port: ${{ secrets.PLESK_STAGING_SSH_PORT }}
